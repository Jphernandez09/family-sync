<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Family Sync — AI Family Sports Organizer</title>
    <meta name="description" content="Upload the chaos. Get one clean family game plan. AI-powered schedule organizer for sports families." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme / status bar -->
    <meta name="theme-color" content="#f97316" />
    <meta name="msapplication-TileColor" content="#f97316" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Family Sync" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="32x32"  href="/icons/icon-96.png" />
    <link rel="shortcut icon" href="/icons/icon-192.png" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Family Sync — AI Family Sports Organizer" />
    <meta property="og:description" content="Upload the chaos. Get one clean family game plan." />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Prevent auto-zoom on input focus (iOS) -->
    <style>
      input, select, textarea {
        font-size: 16px !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
